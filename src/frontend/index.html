<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="ChatGPT with Enterprise Data" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>CHIP - Customer Helper & Information Provider</title>
    <style>
      :root {
        --azc-primary: #06b;
        --azc-bg: #eee;
        --azc-border-radius: 16px;
      }
      html,
      body {
        font-size: 16px;
        margin: 0;
        background: var(--azc-bg);
      }
      nav {
        background: #BFB800;
        color: #696158;
        font-weight: bold;
        padding: 16px;
        font-family:
          'Segoe UI',
          -apple-system,
          BlinkMacSystemFont,
          Roboto,
          'Helvetica Neue',
          sans-serif;
        font-size: 1.25rem;
      }
      .corner-image {
        position: absolute;
        top:20px;
        right:0;
        
      }
      .corner-image img {
        width: 100%;
        height:auto;
        
      }
      
      azc-chat {
        display: block;
        max-width: 1024px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <nav>CHIP - Customer Helper & Information Provider</nav>
    <div class="corner-image">
      <img align="right" src="image.png" alt="Arauco">
    </div>
    <azc-chat></azc-chat>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
